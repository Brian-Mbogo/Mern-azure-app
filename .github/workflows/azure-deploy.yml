name: Build and Deploy MERN App to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client
        working-directory: ./client
        run: npm run build

      - name: (Optional) build server
        working-directory: ./server
        run: |
          if [ -f package.json ]; then
            npm run build || echo "no server build script"
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: .

# Notes:
# - Set repository secrets `AZURE_WEBAPP_NAME` and `AZURE_PUBLISH_PROFILE` in GitHub.
#   The publish profile is obtained from the Azure Portal (Get publish profile for the Web App).
# - The action deploys the repository root; ensure that `server` and `client/build` exist at deploy time.